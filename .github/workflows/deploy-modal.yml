name: Deploy to Modal

on:
  push:
    branches: [main]
    paths:
      - 'modal/**'
      - '.github/workflows/deploy-modal.yml'
  workflow_dispatch:  # 手动触发

env:
  # Modal 认证环境变量
  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal
        run: pip install modal

      - name: Verify Modal credentials
        run: |
          echo "Checking Modal credentials..."
          if [ -z "$MODAL_TOKEN_ID" ] || [ -z "$MODAL_TOKEN_SECRET" ]; then
            echo "❌ Modal credentials not configured!"
            echo "Please add MODAL_TOKEN_ID and MODAL_TOKEN_SECRET to GitHub Secrets"
            exit 1
          fi
          echo "✅ Modal credentials found"

      - name: Deploy Seed-VC Mock
        run: |
          echo "🚀 Deploying Seed-VC Mock to Modal..."
          modal deploy modal/seed_vc_mock.py

      - name: Verify deployment
        run: |
          echo "📋 Getting deployment info..."
          modal app show seed-vc-mock || echo "App info not available"

          echo ""
          echo "✅ Deployment complete!"
          echo ""
          echo "Web Endpoint URL: https://ac-l85cvzxpz5kmbbnuoo6iyx--seed-vc-mock.modal.run"

      - name: Test health endpoint
        run: |
          echo "🏥 Testing health endpoint..."
          sleep 5
          curl -s https://ac-l85cvzxpz5kmbbnuoo6iyx--seed-vc-mock.modal.run/health || echo "Health check request sent"
