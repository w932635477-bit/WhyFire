name: Deploy to Modal

on:
  push:
    branches: [main]
    paths:
      - 'modal/**'
      - '.github/workflows/deploy-modal.yml'
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Modal 认证（从仓库 secrets 读取）
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Modal and dependencies
        run: pip install modal pydantic

      - name: Check credentials
        run: |
          echo "Checking credentials..."
          if [ -n "$MODAL_TOKEN_ID" ]; then
            echo "✅ MODAL_TOKEN_ID is set (${#MODAL_TOKEN_ID} chars)"
          else
            echo "❌ MODAL_TOKEN_ID is NOT set"
          fi
          if [ -n "$MODAL_TOKEN_SECRET" ]; then
            echo "✅ MODAL_TOKEN_SECRET is set (${#MODAL_TOKEN_SECRET} chars)"
          else
            echo "❌ MODAL_TOKEN_SECRET is NOT set"
          fi

      - name: Deploy Seed-VC Real (GPU)
        if: env.MODAL_TOKEN_ID != '' && env.MODAL_TOKEN_SECRET != ''
        run: |
          echo "🚀 Deploying Seed-VC Real to Modal (GPU)..."
          modal deploy modal/seed_vc_real.py

      - name: Deployment info
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Modal Web Endpoint URLs:"
          echo ""
          echo "Mock Version (for testing):"
          echo "  https://w932635477--seed-vc-mock.modal.run"
          echo ""
          echo "Real Version (GPU, for production):"
          echo "  https://w932635477--seed-vc-real.modal.run"
          echo ""
          echo "Health Check:"
          echo "  curl https://w932635477--seed-vc-real.modal.run/health"
          echo "=========================================="
